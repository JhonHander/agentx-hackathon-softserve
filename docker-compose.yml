# version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: evershop/evershop-hackathon:local
    restart: always
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_USER: postgres
      DB_NAME: postgres
      RAG_ORCHESTRATOR_MESSAGE_URL: http://rag-api:8000/agents/orchestrator/message
      RAG_ORCHESTRATOR_TIMEOUT_MS: 30000
    networks:
      - myevershop
    depends_on:
      - database
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
  
  #The postgres database: 
  database:
    image: postgres:16.4
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - myevershop

networks:
  myevershop:
    name: MyEverShop
    driver: bridge

volumes:
  postgres-data:
