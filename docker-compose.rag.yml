services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - myevershop

  rag-api:
    build:
      context: ./rag
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: evershop_codebase
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      INCIDENT_API_URL: ${INCIDENT_API_URL:-http://app:3000/api/incidents}
      INCIDENT_RECOMMENDATION_API_URL: ${INCIDENT_RECOMMENDATION_API_URL:-http://app:3000/api/incidents/recommendations}
      INCIDENT_API_TIMEOUT_SECONDS: ${INCIDENT_API_TIMEOUT_SECONDS:-20}
      ORCHESTRATOR_RAG_TOP_K: ${ORCHESTRATOR_RAG_TOP_K:-8}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_TIMEOUT_SECONDS: ${JIRA_TIMEOUT_SECONDS:-20}
      JIRA_MODE: ${JIRA_MODE:-auto}
      JIRA_MCP_ENABLED: ${JIRA_MCP_ENABLED:-true}
      JIRA_MCP_TRANSPORT: ${JIRA_MCP_TRANSPORT:-streamable_http}
      JIRA_MCP_URL: ${JIRA_MCP_URL:-https://mcp.atlassian.com/v1/mcp}
      JIRA_MCP_BEARER_TOKEN: ${JIRA_MCP_BEARER_TOKEN:-}
      JIRA_MCP_HEADERS_JSON: ${JIRA_MCP_HEADERS_JSON:-}
      JIRA_MCP_TOOL_CREATE_ISSUE: ${JIRA_MCP_TOOL_CREATE_ISSUE:-createJiraIssue}
      JIRA_MCP_TIMEOUT_SECONDS: ${JIRA_MCP_TIMEOUT_SECONDS:-25}
      JIRA_MCP_COMMAND: ${JIRA_MCP_COMMAND:-}
      JIRA_MCP_ARGS: ${JIRA_MCP_ARGS:--y,mcp-remote,https://mcp.atlassian.com/v1/mcp}
      JIRA_MCP_CWD: ${JIRA_MCP_CWD:-}
      JIRA_MCP_CREATE_ISSUE_ARGS_JSON: ${JIRA_MCP_CREATE_ISSUE_ARGS_JSON:-}
      JIRA_CLOUD_ID: ${JIRA_CLOUD_ID:-}
      JIRA_WEBHOOK_ENABLED: ${JIRA_WEBHOOK_ENABLED:-true}
      JIRA_WEBHOOK_SECRET: ${JIRA_WEBHOOK_SECRET:-}
      JIRA_DONE_STATUS_NAMES: ${JIRA_DONE_STATUS_NAMES:-done,resolved,closed,finalizado,terminado}
      JIRA_TICKET_REGISTRY_PATH: ${JIRA_TICKET_REGISTRY_PATH:-/app/data/jira_ticket_registry.json}
      REPORTER_EMAIL_NOTIFICATIONS_ENABLED: ${REPORTER_EMAIL_NOTIFICATIONS_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-EverShop Support}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-1200}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-200}
      RAG_MAX_FILE_BYTES: ${RAG_MAX_FILE_BYTES:-800000}
      RAG_REPO_PATH: /workspace/repo
    volumes:
      - ./:/workspace/repo:ro
      - rag-runtime:/app/data
    ports:
      - "8008:8000"
    networks:
      - myevershop

  rag-indexer:
    build:
      context: ./rag
      dockerfile: Dockerfile
    profiles:
      - manual
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: evershop_codebase
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-1200}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-200}
      RAG_MAX_FILE_BYTES: ${RAG_MAX_FILE_BYTES:-800000}
    volumes:
      - ./:/workspace/repo:ro
    command: ["python", "/app/src/index_codebase.py", "--repo-path", "/workspace/repo"]
    networks:
      - myevershop

networks:
  myevershop:
    name: MyEverShop
    driver: bridge

volumes:
  qdrant-storage:
  rag-runtime:
